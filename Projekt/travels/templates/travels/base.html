<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Organizacja podróży{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: .5px; }
    .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .table thead th { background-color: #0d6efd; color: #fff; border-color: #0d6efd; }
    .badge-pending   { background-color: #ffc107; color: #000; }
    .badge-confirmed { background-color: #198754; }
    .badge-cancelled { background-color: #dc3545; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  <div class="container">
    <a class="navbar-brand" href="{% url 'trip_list' %}">
      <i class="bi bi-airplane-fill me-1"></i>Organizacja podróży
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link {% block nav_trips %}{% endblock %}" href="{% url 'trip_list' %}">
            <i class="bi bi-map me-1"></i>Wycieczki
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% block nav_travelers %}{% endblock %}" href="{% url 'traveler_list' %}">
            <i class="bi bi-people me-1"></i>Podróżnicy
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container py-4">
  {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  {% endfor %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
